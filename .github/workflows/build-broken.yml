name: iOS Build - Broken (10.0.60 regression)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build-broken.yml'
      - 'MauiBugRepro/**'

# This workflow reproduces the regression that started ~2-3 PM Central on 2026-05-18.
# Affected: net10.0-ios on macos-26 runner; Android is unaffected.
#
# The build fails in Xamarin.Shared.targets(2091) / DetectSdkLocations with:
#   System.TypeInitializationException → System.ArgumentNullException (Parameter 'path')
#   at Xamarin.MacDev.AppleSdkSettings..cctor() (AppleSdkSettings.cs:145)
#
# The macos-26 runner ships with Xcode 26.5, which caused workload resolution to pull
# Microsoft.iOS.Sdk.net10.0_26.5/26.5.10280. AppleSdkSettings fails to locate the
# Xcode developer directory under that workload, returning null for the path.
#
# This affects projects both with and without pinned SDK/workload versions,
# confirming the regression is in the workload pack itself, not project config.
# Last known-good workload: 10.0.50 (see build-working.yml).

jobs:
  build-ios:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.203'

      - name: Install MAUI workload (latest - picks up broken 10.0.60)
        # No rollback file → resolves to whatever is current in the feed.
        # On macos-26 as of 2026-05-18 this resolves to workload 26.5.10280,
        # which introduced the AppleSdkSettings null-path regression.
        run: |
          dotnet workload install maui-ios maui-android \
            --source https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet10/nuget/v3/index.json \
            --source https://api.nuget.org/v3/index.json

      - name: Show installed workload versions (for diagnostics)
        run: dotnet workload list

      - name: Restore NuGet packages
        run: dotnet restore MauiBugRepro/MauiBugRepro.csproj

      - name: Build iOS (no codesign for CI)
        # This step FAILS on 10.0.60 / workload 26.5.10280 with DetectSdkLocations throwing
        # ArgumentNullException in AppleSdkSettings. Consistent across pinned and unpinned
        # workload projects, so the fault is in the workload pack, not project configuration.
        run: |
          dotnet build MauiBugRepro/MauiBugRepro.csproj \
            -f net10.0-ios \
            -c Release \
            /p:RuntimeIdentifier=ios-arm64 \
            /p:CodesignKey="" \
            /p:CodesignProvision="" \
            /p:ArchiveOnBuild=false \
            /p:EnableCodeSigning=false \
            /bl:build-broken.binlog

      - name: Upload build log (always — most useful when the build fails)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-broken-binlog
          path: build-broken.binlog
